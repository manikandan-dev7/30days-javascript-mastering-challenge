<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>queue</title>
  </head>
  <body>
    <input
      id="inputName"
      type="text"
      placeholder="Enter Name"
      style="width: 30%; height: 50px"
    />
    <br /><br />
    <button onclick="addToEnd()">Add to end</button>
    <button onclick="removeEnd()">Remove End</button>
    <button onclick="addToTop()">Add to top</button>
    <button onclick="removeTop()">Remove Top</button>
    <button onclick="checker()">Checker</button>
    <button onclick="findPosition()">Find</button>

    <p id="status"></p>
    <ul id="list"></ul>

    <script>
      let inputName = document.getElementById("inputName");
      let status = document.getElementById("status");
      let list = document.getElementById("list");

      let studentList = ["shiva", "arjun", "ravi"];

      function display() {
        list.innerHTML = "";
        studentList.forEach((el) => {
          let li = document.createElement("li");
          li.textContent = el;
          list.append(li);
        });
      }

      function addToEnd() {
        let val = inputName.value.trim();
        if (val === "") {
          status.textContent = "it must be name";
          return;
        } else if (!isNaN(val)) {
          status.textContent = "it must be a letter";
          return;
        } else if (val.length <= 3) {
          status.textContent = "name is too short";
          return;
        } else {
          status.textContent = "added";
          studentList.push(val);
        }
        display();
      }
      function removeEnd() {
        status.textContent = "Removed last";
        studentList.pop();
        display();
      }
      function addToTop() {
        let val = inputName.value.trim();
        if (val === "") {
          status.textContent = " it must be a name";
          return;
        } else if (!isNaN(val)) {
          status.textContent = "it must be a letter";
          return;
        } else if (val.length <= 3) {
          status.textContent = "its too short";
          return;
        } else {
          status.textContent = "added";
          studentList.unshift(val);
        }
        display();
      }
      function removeTop(){
        status.textContent= "removed";
        studentList.shift()
        display()
      }
      function checker(){
       let val = inputName.value.trim();
       if(studentList.includes(val)){
        status.textContent = `${val} is available in the queue`;
        return;
       } 
       else{
        status.textContent = "not found"
       }
       display()
      }

      function findPosition(){
        let val = inputName.value.trim()
        let result = studentList.indexOf(val);
        if(result === -1){
          status.textContent = `${val} not found you can add`;
          return;
        }
        else{
          status.textContent = `${val} is at the postion ${result +1}`
        }
        display()
      }

      display();
    </script>
  </body>
</html>
