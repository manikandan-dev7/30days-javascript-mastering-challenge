<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Queue Manager</h2>
    <input id="inputNam" type="text" placeholder="Enter your Name" />
    <br /><br />
    <button onclick="addToEnd()">Add to End</button>
    <button onclick="removeLast()">Remove last</button>
    <button onclick="addToFront()">Add to Front</button>
    <button onclick="removeFirst()">Remove First</button>
    <button onclick="checkName()">Check Name</button>
    <button onclick="findPosition()">Find Position</button>

    <p id="status"></p>
    <ul id="listednames"></ul>

    <script>
      let names = ["Ravi", "Priya", "Arjun"];
      let inputNam = document.getElementById("inputNam");
      let status = document.getElementById("status");
      let listedNames = document.getElementById("listednames");

      function display() {
        inputNam.value = "";
        listedNames.innerHTML = "";
        names.forEach((arr) => {
          let li = document.createElement("li");
          li.textContent = arr;
          listedNames.append(li);
        });
      }
      function addToEnd() {
        let val = inputNam.value.trim();
        if (val === "") {
          status.textContent = "Enter a name";
        } else if (!isNaN(val)) {
          status.textContent = "Name must be a letter";
        } else if (names.includes(val)) {
          status.textContent = "already added";
        } else {
          names.push(val);
          status.textContent = "Added Last";
          display();
        }
      }
      function removeLast() {
        status.textContent = "Removed Last";
        names.pop()
        display()
      }
      function addToFront(){
        let val  = inputNam.value.trim();
        if(val === ""){
            status.textContent = "Enter a name";
        }else if(!isNaN(val)){
            status.textContent = "name must be a letter";
        }else if(names.includes(val)){
            status.textContent = "Already added";
        }
        else{
            names.unshift(val);
            status.textContent = "Added Top";
            display()
        }
      }
      function removeFirst(){
        names.shift()
        status.textContent = "removed First";
        display()
      }
      function checkName(){
        let val = inputNam.value.trim();
        if(names.includes(val)){
            status.textContent = `Yes, ${val} is in the list`;
        }
        else{
            status.textContent =`${val} is not Found u can add`
        }
      }
      function findPosition(){
        let val = inputNam.value.trim();
        let result = names.indexOf(val)
        console.log(result);
        if(result === -1){
            status.textContent = "Not found"
        }
        else{
             status.textContent = `${val} is at position ${result + 1}`
        }
      }
      display();
    </script>
  </body>
</html>
