<!-- UI:
- One button "Generate Scores"
- Click → shows 5 random scores (1–100)
- Shows Total, Average, Highest below

Logic:
- Random scores → Math.floor + Math.random + loop
- Total → reduce
- Average → total / 5  
- Highest → reduce -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="generate()">Generate</button>
    <ul id="displayList"></ul>
    <div id="result"></div>
    <p id="status"></p>

    <script>
      let displayList = document.getElementById("displayList");
      let result = document.getElementById("result");
      let status = document.getElementById("status");

      function generate() {
        let marks = [];
        displayList.innerHTML = "";
        result.innerHTML = "";
        for (let i = 0; i < 5; i++) {
          marks.push(Math.floor(Math.random() * 71) + 30);
        }
        marks.forEach((item) => {
          let li = document.createElement("li");
          li.textContent = item;
          displayList.append(li);
        });
        let total = marks.reduce((acc, curr) => {
          return acc + curr;
        }, 0);
        let p1 = document.createElement("p");
        p1.textContent = `Total: ${total}`;
        result.append(p1);
        let average = total / marks.length;
        let p2 = document.createElement("p");
        p2.textContent = `Average: ${average}`;
        result.append(p2);
        let highest = marks.reduce((acc, curr) => {
          return acc > curr ? acc : curr;
        }, 0);
        let p3 = document.createElement("p");
        p3.textContent = `Highest: ${highest}`;
        result.append(p3);
        console.log(marks);
        let failure = [];
        marks.forEach((el) => {
          if (el <= 40) {
            failure.push(`no ${marks.indexOf(el) + 1} got fail`);
          }
        });
        status.textContent = failure.length > 0 ? failure : "all passed!"
      }
    </script>
  </body>
</html>
