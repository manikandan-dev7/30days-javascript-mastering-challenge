<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class list</title>
  </head>
  <body>
    <h2>Student Batch Manager</h2>
    <input
      id="nameInput"
      type="text"
      placeholder="enter name by using comma"
      style="width: 30%; height: 40px"
    />
    <br />
    <br />

    <button onclick="addNames()">Add Names</button>
    <button onclick="mergeNames()">Merge with Batch2</button>
    <button onclick="reset()">Reset</button>
    <p id="status"></p>
    <ul id="studentList"></ul>

    <script>
      let nameInput = document.getElementById("nameInput");
      let status = document.getElementById("status");
      let studentList = document.getElementById("studentList");
      let classA = ["Mani", "Ravi", "Priya"];
      let classB = ["Ravi", "Karthik", "Mani", "Deepa"];
      let students = [...classA];
      function display() {
        studentList.innerHTML = "";
        students.map((item) => {
          let li = document.createElement("li");
          li.textContent = item;
          studentList.append(li);
        });
      }
      function addNames() {
        let val = nameInput.value.trim();
        let names = val.split(",").map((item) => item.trim());
        students = [...new Set([...names, ...students])];
        console.log(students);
        display();
      }
      function mergeNames() {
        students = [...new Set([...classB,...students])];
        console.log(students);
        display();
      }
      function reset() {
        students = [...classA];
        display();
      }
      display();
    </script>
  </body>
</html>
